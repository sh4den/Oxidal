name: Build and Publish

on:
  push:
    branches: [main]

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.vars.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute version
        id: vars
        run: |
          echo "version=$(grep -m1 '^version' Cargo.toml | sed -E 's/version = "(.*)"/\1/')" >> "$GITHUB_OUTPUT"

  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - name: windows-x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
          - name: windows-arm64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
          - name: macos-intel
            runner: macos-latest
            target: x86_64-apple-darwin
          - name: macos-apple-silicon
            runner: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            pkg-config \
            libudev-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libwayland-dev \
            libpython3-dev \
            libdbus-1-dev \
            libxkbcommon-x11-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libssl-dev \
            libzstd-dev \
            libvulkan1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.name }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          tar -czf "dist/oxidal-v${{ needs.version.outputs.version }}-${{ matrix.name }}.tar.gz" \
            -C "target/${{ matrix.target }}/release" Oxidal
          cp "target/${{ matrix.target }}/release/Oxidal" "dist/Oxidal-${{ matrix.name }}"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path "target/${{ matrix.target }}/release/Oxidal.exe" `
            -DestinationPath "dist/oxidal-v${{ needs.version.outputs.version }}-${{ matrix.name }}.zip"
          Copy-Item "target/${{ matrix.target }}/release/Oxidal.exe" "dist/Oxidal-${{ matrix.name }}.exe"

      - name: Build installer (linux)
        if: runner.os == 'Linux'
        run: |
          arch="${{ matrix.name }}"
          bash packaging/linux/make-deb.sh "${{ needs.version.outputs.version }}" \
            "target/${{ matrix.target }}/release/Oxidal" "${arch#linux-}" dist

      - name: Build installer (macos)
        if: runner.os == 'macOS'
        run: |
          bash packaging/macos/make-dmg.sh "${{ needs.version.outputs.version }}" \
            "target/${{ matrix.target }}/release/Oxidal" "${{ matrix.name }}" dist

      - name: Build installer (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            choco install innosetup -y --no-progress
            $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          }
          $bin = (Resolve-Path "target/${{ matrix.target }}/release/Oxidal.exe").Path
          $out = Join-Path (Get-Location) "dist"
          $arch = "${{ matrix.name }}".Replace("windows-", "")
          & $iscc "/DAppVersion=${{ needs.version.outputs.version }}" "/DArch=$arch" `
            "/DBinPath=$bin" "/O$out" packaging/windows/oxidal.iss

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oxidal-${{ matrix.name }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          generate_release_notes: true
          files: dist/*
          body: |
            Installers (Windows setup, macOS dmg, Debian/Ubuntu deb) and portable builds for Windows (x86_64, arm64), Linux (amd64, arm64) and macOS (Intel, Apple Silicon) are attached below.

            **macOS first launch:** builds are not notarized. If macOS blocks the app, allow it in System Settings > Privacy & Security > "Open Anyway", or run:
            ```
            xattr -dr com.apple.quarantine /Applications/Oxidal.app
            ```
